# server4home local secret store — EXAMPLE / TEMPLATE
#
# Copy this file to  secrets/secrets.yaml  (which is gitignored) and fill in
# real values. Manifests reference these by name, never by value:
#
#   install:
#     - name: k3s
#       config:
#         mode: agent
#         server: https://k3s-cp-01.lan:6443
#         token: { secret: "k3s/homelab/agent-token" }
#
# The runner resolves `{ secret: <name> }` against this store at deploy time.
# secrets/secrets.yaml must NEVER be committed (see .gitignore).
#
# ---------------------------------------------------------------------------
# Layout: globals + optional per-hostname overlays
# ---------------------------------------------------------------------------
# Two layers, resolved in order:
#
#   1. YAML per-host overlay   — `<hostname>: { <name>: <value> }`
#   2. YAML global             — `<name>: <value>` at the top level
#   3. Filesystem per-host     — `secrets/<hostname>/<name>` on disk
#   4. Filesystem global       — `secrets/<name>` on disk    (PEMs etc.)
#
# The hostname comes from the manifest's `hostname:` field. Use overlays
# when two VMs share a manifest convention but need different values
# (e.g. distinct rancher/admin-password per cluster). Keep shared things
# (PVE token, wildcard cert, homelab CA) at the global layer so you only
# rotate them once. Keys are free-form strings; a path-like convention
# keeps things tidy.

# ---------------------------------------------------------------------------
# Globals — shared across every VM
# ---------------------------------------------------------------------------

# Default K3s join token used by anything that wires up an agent or extra
# server node. The exact value is what `sudo cat /var/lib/rancher/k3s/server/node-token`
# prints on the existing CP.
"k3s/homelab/agent-token":  "K10REPLACEME::server:REPLACEME"
"k3s/homelab/server-token": "K10REPLACEME::server:REPLACEME"
"k3s/homelab/node-token":   "K10REPLACEME::server:REPLACEME"

# Proxmox VE API token for the `pve9` target. Format the UI shows you at
# token creation:  <user>@<realm>!<token-id>=<secret-uuid>
# See docs/k3s-rancher-vms.md for the exact PVE permissions to grant.
"proxmox/api-token":        "server4home@pve!deploy=REPLACEME-UUID-HERE"

# A *global* rancher bootstrap password. Will be used by any manifest whose
# hostname is NOT listed in the overlays section below.
"rancher/admin-password":   "REPLACEME"

# ---------------------------------------------------------------------------
# Per-hostname overlays — narrow a value to one specific VM
# ---------------------------------------------------------------------------
# Each top-level mapping is a hostname overlay. Keys inside override the
# globals above when the manifest with that `hostname:` is being deployed.
# Omit a section entirely if a VM has no overrides.

k3s-rancher-on-ucore-pve-vm:
  "rancher/admin-password": "REPLACEME-prod-only"

k3s-on-virt-manager:
  "rancher/admin-password": "REPLACEME-spare-only"

# ---------------------------------------------------------------------------
# Multi-line values (TLS PEMs etc.) usually live on disk as files under
# secrets/private/... rather than inline here. A manifest reference like
#   { secret: "private/homelab-certs/wc.local.homelabsolutions.net.pem" }
# resolves to secrets/private/homelab-certs/wc.local.homelabsolutions.net.pem
# automatically (and to secrets/<hostname>/private/.../same.pem if you ever
# need a per-host override).
