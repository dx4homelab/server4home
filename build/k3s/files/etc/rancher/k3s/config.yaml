# K3s server config — read on every start. Keys here are equivalent to k3s
# CLI flags (with leading "--" stripped). See: https://docs.k3s.io/cli/server
#
# Files under /etc/rancher/k3s/config.yaml.d/*.yaml are also merged in, so
# operator overrides can live there without editing the image-baked file.

# Let wheel-group users read the admin kubeconfig directly (skips needing
# `sudo` for every kubectl call). The developer user is in wheel via
# iso/disk.toml's [[customizations.user]].
write-kubeconfig-mode: "0640"
write-kubeconfig-group: "wheel"

# Scheduled etcd snapshots. Pairs with the bootc auto-upgrade timer — every
# 6h K3s writes a snapshot, so a problematic upgrade always has a recent
# restore point. Only takes effect on embedded-etcd clusters (the default;
# `disable=cluster-init=true` for sqlite opts out). Ignored on agent nodes.
#
# Snapshots land at /var/lib/rancher/k3s/server/db/snapshots/  — on the
# LVM data disk, so they survive bootc upgrades. K3s rotates per
# etcd-snapshot-retention.
#
# For off-host DR, add etcd-s3 settings here (or in a config.yaml.d drop-in).
etcd-snapshot-schedule-cron: "0 */6 * * *"
etcd-snapshot-retention: 5
