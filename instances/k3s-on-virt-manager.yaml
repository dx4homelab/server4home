# instances/k3s-on-virt-manager.yaml

base: k3s-base
hostname: k3s-test-on-virt-manager
target: local-virt-manager

disks:
  - path: /var/lib/rancher
    size: 60G
    type: lvm

network:
  - name: default
    type: bridge
    mac:
      provisioner: default
    ip:
      provisioner: static
      static: 192.168.130.10/16       # ADJUST: pick a free IP on your LAN  
      gateway: 192.168.1.1
      dns: 192.168.1.1

install:
  - name: k3s
    version: v1.35.4+k3s1
    args:
      # Traefik stays enabled; MetalLB hands it the VIP below.
      # ServiceLB is replaced by MetalLB.
      - --disable=servicelb

  # L4 LoadBalancer for the cluster. The VIP becomes Traefik's external IP;
  # DNS for rancher0ucore.local.homelabsolutions.net should point here.
  - name: metallb
    version: 0.15.3                     # 0.16.0 has an upstream chart template bug; bump when fixed
    config:
      vip: 192.168.130.50               # ADJUST: free IP on your LAN, distinct from node IP

  # Pre-stage the wildcard cert + key as the secret Rancher's ingress reads
  - name: kubernetes-secret
    config:
      name: tls-rancher-ingress
      namespace: cattle-system
      type: tls
      data:
        tls.crt: { secret: "private/homelab-certs/wc.local.homelabsolutions.net.pem" }
        tls.key: { secret: "private/homelab-certs/wc.local.homelabsolutions.net.cert.key.pem" }

  # Pre-stage the CA cert as the secret Rancher reads for privateCA trust
  - name: kubernetes-secret
    config:
      name: tls-ca
      namespace: cattle-system
      type: opaque
      data:
        cacerts.pem: { secret: "private/homelab-certs/ca.homelabsolutions.net.crt" }

  - name: rancher-manager
    version: v2.14.1
    config:
      hostname: rancher0ucore.local.homelabsolutions.net
      bootstrapPassword: { secret: "rancher/admin-password" } # was: admin
      replicas: 1
      ingress:
        enabled: true
        tls:
          source: secret             # use tls-rancher-ingress (pre-staged above)
      privateCA: true                # use tls-ca (pre-staged above)
      cert-manager-auto: false       # we're BYO cert; skip cert-manager dep
